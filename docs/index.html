<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>EEKLERA WORLD</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #060608;
      --surface: #0e0e14;
      --card: #13131c;
      --border: rgba(255,255,255,0.06);
      --accent: #c8a0ff;
      --accent2: #ff8fd4;
      --accent3: #7fd4ff;
      --gold: #ffd770;
      --text: #f0ecff;
      --muted: rgba(240,236,255,0.45);
      --glow: rgba(200,160,255,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Onest',sans-serif; }
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; opacity:0.4;
    }
    body::after {
      content:''; position:fixed; width:600px; height:600px;
      border-radius:50%; top:-200px; right:-200px; z-index:0;
      background: radial-gradient(circle, rgba(200,160,255,0.08) 0%, transparent 70%);
      pointer-events:none;
    }
    #app { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; }
    .header {
      padding: 16px 20px 12px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(14,14,20,0.95) 0%, transparent 100%);
      backdrop-filter: blur(12px);
      flex-shrink:0;
    }
    .logo {
      font-family:'Unbounded',sans-serif; font-weight:900; font-size:18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      letter-spacing:-0.5px;
    }
    .user-pill {
      display:flex; align-items:center; gap:8px;
      background: var(--card); border:1px solid var(--border);
      border-radius:50px; padding:5px 12px 5px 5px;
    }
    .user-avatar {
      width:28px; height:28px; border-radius:50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; color:var(--bg);
    }
    .user-name { font-size:12px; font-weight:500; }
    .content { flex:1; overflow-y:auto; overflow-x:hidden; scroll-behavior:smooth; }
    .content::-webkit-scrollbar { width:3px; }
    .content::-webkit-scrollbar-track { background:transparent; }
    .content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .page { display:none; animation: fadeUp 0.3s ease forwards; }
    .page.active { display:block; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .hero {
      position:relative; padding: 28px 20px 20px; overflow:hidden;
    }
    .hero-badge {
      display:inline-flex; align-items:center; gap:6px;
      background: rgba(200,160,255,0.1); border:1px solid rgba(200,160,255,0.25);
      border-radius:20px; padding:4px 12px; font-size:11px; color:var(--accent);
      margin-bottom:14px; font-weight:500; letter-spacing:0.5px;
    }
    .hero-badge::before { content:'●'; font-size:8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hero h1 {
      font-family:'Unbounded',sans-serif; font-size:26px; font-weight:900;
      line-height:1.1; letter-spacing:-1px; margin-bottom:8px;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .hero p { color:var(--muted); font-size:13px; line-height:1.6; max-width:280px; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">EEKLERA</div>
    <div class="user-pill">
      <div class="user-avatar" id="hdrAva">?</div>
      <span class="user-name" id="hdrName">Загрузка...</span>
    </div>
  </div>
  <div class="content">
    <div class="page active" id="page-home">
      <div class="hero">
        <div class="hero-badge">🎙 EEKLERA WORLD</div>
        <h1>Добро<br>пожаловать в<br><span>мир EEKLERA</span></h1>
        <p>Общайся, получай опыт, открывай контент и становись частью вселенной Валерии 💜</p>
      </div>
    </div>
  </div>
</div>
<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const tgUser = tg?.initDataUnsafe?.user;
if (tgUser) {
  const initials = (tgUser.first_name || '?').slice(0,1).toUpperCase();
  document.getElementById('hdrAva').textContent = initials;
  document.getElementById('hdrName').textContent = tgUser.first_name || 'Пользователь';
}
</script>
</body>
</html>
